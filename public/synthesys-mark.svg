<svg width="400" height="400" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Synthesys">
  <defs>
    <linearGradient id="s-grad" x1="72" y1="20" x2="28" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#5B7CFA"/>
      <stop offset="100%" stop-color="#2DE2C0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="100" height="100" rx="20"/>
    </clipPath>
  </defs>

  <!-- White container -->
  <rect width="100" height="100" rx="20" fill="#FFFFFF"/>
  <rect width="100" height="100" rx="20" stroke="#DDE1EA" stroke-width="1.5" fill="none"/>

  <g clip-path="url(#clip)">
    <!-- Gradient S -->
    <path
      d="M 72 20 C 72 11,52 8,36 12 C 16 16,12 34,26 43 C 36 50,64 50,74 57 C 88 66,84 84,68 88 C 56 92,28 90,28 80"
      stroke="url(#s-grad)"
      stroke-width="10.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Top-right corner mark — indigo -->
    <path d="M 84 30 L 84 16 L 70 16"
      stroke="#5B7CFA" stroke-width="2.5"
      stroke-linecap="square" stroke-linejoin="miter" fill="none"/>

    <!-- Bottom-left corner mark — mint -->
    <path d="M 16 70 L 16 84 L 30 84"
      stroke="#2DE2C0" stroke-width="2.5"
      stroke-linecap="square" stroke-linejoin="miter" fill="none"/>
  </g>
</svg>
